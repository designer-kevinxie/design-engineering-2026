<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="title" content="Card Component Example" />
    <title>Card Component</title>
    <link rel="stylesheet" href="style-new.css" />
    <!-- font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Monda:wght@400..700&family=Noto+Sans+JP:wght@100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main class="product-purchase">
      <article class="product-card">
        <div class="product-info">
          <div class="product-tags">
            <span class="product-tag-new">NEW</span>
            <span class="product-tag-bulk">まとめ買い</span>
          </div>
          <h3 class="product-name">NEW CLASSIC NO.02</h3>
          <div class="product-number-category">
            <p class="product-number">UTF-25A-255</p>
            <p class="product-category">クラシック</p>
          </div>
        </div>
        <div class="image-wrapper">
          <img
            id="glasses-image"
            src="./assets/jins-glasses-brown.webp"
            alt="image of NEW CLASSIC No.02"
          />
          <button class="favorite-button" aria-label="add to favorites">
            <svg class="icon-heart" viewBox="0 0 24 24" width="21" height="21">
              <path
                d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"
              />
            </svg>
          </button>
        </div>
        <div class="choose-frame-color">
          <ul class="color-swatches" id="color-swatches-container">
            <!-- <li
              class="color-option color-active"
              style="--btn-color: #5e3b33"
              data-glasses-color="brown"
            ></li>
            <li
              class="color-option"
              style="--btn-color: #3e2b26"
              data-glasses-color="black"
            ></li> -->
          </ul>
          <div class="selected-color">
            <span>フレームのカラー：</span>
            <span id="selected-frame-color"></span>
          </div>
        </div>
        <div class="choose-lenses">
          <div class="lenses-cards" id="lenses-container">
            <!-- <div class="lenses-card card-active" data-lenses-id="01">
              <img src="./assets/clear-lens.png" alt="image of a clear lens" />
              <p>通常クリアレンズ</p>
              <div class="plus-price">
                <span>+</span
                ><span class="price-in-card" data-price="0">¥０</span>
              </div>
            </div>
            <div class="lenses-card" data-lenses-id="02">
              <img src="./assets/clear-lens.png" alt="image of a clear lens" />
              <p>JINS SCREEN</p>
              <div class="plus-price">
                <span>+</span
                ><span class="price-in-card" data-price="5500">¥５,500 </span>
              </div>
            </div>
            <div class="lenses-card" data-lenses-id="03">
              <img src="./assets/clear-lens.png" alt="image of a clear lens" />
              <p>極薄レンズ</p>
              <div class="plus-price">
                <span>+</span
                ><span class="price-in-card" data-price="11000">¥11,000</span>
              </div>
            </div> -->
          </div>
          <div class="selected-lenses">
            <span>レンズ：</span>
            <span id="selected-lenses"></span>
          </div>
        </div>
      </article>

      <aside class="price-pop-up">
        <div class="price-breakdown">
          <div class="item-price-line">
            <span>フレーム：</span> <span id="selected-frame-color-check"></span>
            <span class="item-price-check" id="base-price-check"></span>
          </div>
          <div class="item-price-line">
            <span>レンズ：</span>
            <span id="selected-lenses-check"></span>
            <span class="item-price-check" id="lenses-price-check"></span>
          </div>
        </div>
        <hr class="pop-up-hr" />
        <div class="total-price-button">
          <div class="total-price-block">
            <p class="total-text">合計（税込）：</p>
            <p id="total-price-check"></p>
          </div>
          <button class="purchase-button">カートに入れる</button>
          <div class="cart-block">
          
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="28"
              height="28"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="feather feather-shopping-cart"
            >
              <circle cx="9" cy="21" r="1"></circle>
              <circle cx="20" cy="21" r="1"></circle>
              <path
                d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"
              ></path>
            </svg>
            <span id="cart-badge">0</span>
          </div>
        </div>
      </aside>
    </main>
 
  </body>
  <script src="script-new.js"></script>
