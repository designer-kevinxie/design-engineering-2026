<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>我的语言卡片</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <h1>📝 随身翻译卡片</h1>

      <div class="input-area">
        <textarea
          id="input-text"
          rows="3"
          placeholder="输入你想翻译的中文句子..."
        ></textarea>
        <button id="save-btn" class="btn-translate">翻译并制作卡片</button>
      </div>

      <article id="results-container"></article>
    </main>

    <script src="test.js"></script>
  </body>
</html>
